<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>07_定位的特殊应用1</title>
    <style>
      .outer {
        height: 400px;
        background-color: #888;
        position: relative;
      }
      .inner {
        background-color: orange;
        font-size: 20px;
        padding: 20px;
        border: 10px solid black;
        position: absolute;
        /* 这四行CSS属性用于让绝对定位元素充满其定位父元素。 */
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner">你好啊</div>
    </div>
  </body>
</html>
