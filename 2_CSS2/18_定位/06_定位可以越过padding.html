<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>06_定位可以越过padding</title>
    <style>
      .outer {
        width: 800px;
        height: 600px;
        padding: 20px;
        background-color: #888;
        position: relative;
      }
      .inner {
        width: 200px;
        height: 200px;
        background-color: orange;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <!-- 
区域	absolute子元素能到达吗	    原因
padding区域	    可以	        包含块就是 padding 区域，top:0; left:0 就在这里
border区域	    可以（用负值）	  top: -1px 就进入了 border 区域
margin区域	    不行	        margin 在包含块之外，子元素无法参照它定位    
-->
    <div class="outer">
      <div class="inner"></div>
    </div>
  </body>
</html>
