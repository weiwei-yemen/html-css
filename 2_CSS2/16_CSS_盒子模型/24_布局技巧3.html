<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>24_布局技巧3</title>
    <style>
      .outer {
        width: 400px;
        height: 400px;
        background-color: gray;
        text-align: center;
        line-height: 400px;
        font-size: 0px;
        text-indent: 20px;
      }
      img {
        /* middle 的含义是：把元素的垂直中点，对齐到父行盒基线 + 半个 x-height 的位置。 */
        vertical-align: middle;
      }
      span {
        font-size: 40px;
        vertical-align: middle;
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <span>出来玩啊？</span>
      <img src="../images/悟空.jpg" alt="" />
    </div>
  </body>
</html>
