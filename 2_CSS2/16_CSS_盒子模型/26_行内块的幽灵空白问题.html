<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>26_行内块的幽灵空白问题</title>
    <style>
      div {
        width: 600px;
        background-color: skyblue;
        /* font-size: 0; */
      }
      img {
        height: 200px;
        /* 三种解决方案，推荐vertical-align: bottom; */
        /* vertical-align默认是基线对齐，修改为和行盒底部对齐 */
        /* vertical-align: bottom; */
        /* display: block; */
      }
    </style>
  </head>
  <body>
    <div>
      <!-- 行内元素的默认对齐方式是vertical-align：baseline -->
      <!-- 这里的div没有指定高度，有内部的行盒自动撑开，行盒的底部和div的底部是重合的 -->
      <!-- 行盒的baseline与行盒的底部存在间隙，给下沉字符留有空间，就产生了幽灵空白问题 -->
      <span>xxx</span><img src="../images/我的自拍.jpg" alt="悟空" />
    </div>
  </body>
</html>
