<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>02_缩放</title>
    <style>
      .outer {
        width: 200px;
        height: 200px;
        border: 2px solid black;
        margin: 0 auto;
        margin-top: 100px;
      }
      .inner {
        width: 200px;
        height: 200px;
        background-color: deepskyblue;
        /* 一个值同时设置水平和垂直方向缩放 */
        transform: scale(1.5);
      }
      span {
        /* transform对行内元素不生效 */
        display: inline-block;
        font-size: 20px;
        /* 大于1是放大，小于1是缩小 */
        transform: scale(0.5);
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner">你好啊</div>
    </div>
    <span>好</span>
  </body>
</html>
